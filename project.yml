name: Lesaria
options:
  bundleIdPrefix: com.urusborz
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    DEVELOPMENT_TEAM: Z6J65329FJ
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
targets:
  Lesaria:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: build/ci_source
        includes:
          - "*.swift"
        excludes:
          - Lesaria.entitlements
    resources:
      - path: build/ci_source/Assets.xcassets
      - path: build/ci_source/PrivacyInfo.xcprivacy
    entitlements:
      path: build/ci_source/Lesaria.entitlements
    info:
      path: build/ci_source/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.urusborz.lesaria
        PRODUCT_NAME: Lesaria
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
