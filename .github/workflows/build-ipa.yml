name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show available schemes
        working-directory: Lesaria.swiftpm
        run: xcodebuild -list || true

      - name: Build app binary without signing
        working-directory: Lesaria.swiftpm
        run: |
          set -o pipefail
          xcodebuild \
            -scheme "Lesaria" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA for Sideloadly
        run: |
          set -euo pipefail

          PRODUCT_DIR="build/Build/Products/Release-iphoneos"
          APP_SOURCE="$PRODUCT_DIR/Lesaria.app"
          APP_DIR="Payload/Lesaria.app"

          echo "Product directory contents:"
          find "$PRODUCT_DIR" -maxdepth 2 -print

          if [ ! -d "$APP_SOURCE" ]; then
            echo "Expected app bundle not found: $APP_SOURCE"
            exit 1
          fi

          if [ ! -f "$APP_SOURCE/Lesaria" ]; then
            echo "Expected executable not found: $APP_SOURCE/Lesaria"
            exit 1
          fi

          rm -rf Payload Lesaria.ipa
          mkdir -p Payload
          cp -R "$APP_SOURCE" "$APP_DIR"
          chmod +x "$APP_DIR/Lesaria"

          ICON_SOURCE=".github/assets/AppIconSource.jpg"
          if [ ! -f "$ICON_SOURCE" ]; then
            echo "Expected icon source not found: $ICON_SOURCE"
            exit 1
          fi

          generate_icon() {
            local name="$1"
            local size="$2"
            local tmp="$RUNNER_TEMP/${name%.png}.png"
            sips -s format png "$ICON_SOURCE" --out "$tmp" >/dev/null
            sips -z "$size" "$size" "$tmp" --out "$APP_DIR/$name" >/dev/null
          }

          generate_icon "AppIcon60x60@2x.png" 120
          generate_icon "AppIcon60x60@3x.png" 180
          generate_icon "AppIcon76x76@2x.png" 152
          generate_icon "AppIcon83.5x83.5@2x.png" 167
          generate_icon "AppIcon1024.png" 1024

          set_plist_string() {
            local key="$1"
            local value="$2"
            /usr/libexec/PlistBuddy -c "Set :$key $value" "$APP_DIR/Info.plist" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :$key string $value" "$APP_DIR/Info.plist"
          }

          set_plist_string "CFBundleDisplayName" "Lesaria"
          set_plist_string "CFBundleName" "Lesaria"
          set_plist_string "CFBundleIdentifier" "com.urusborz.lesaria"

          plutil -lint "$APP_DIR/Info.plist"
          /usr/bin/zip -r -y Lesaria.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lesaria-unsigned-ipa
          path: Lesaria.ipa

      - name: Create GitHub Release with IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Lesaria Build #${{ github.run_number }}"
          body: |
            Automatischer Build vom ${{ github.sha }}

            **Zum Installieren:** IPA herunterladen → Sideloadly → aufs iPhone spielen.
          files: Lesaria.ipa
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
