name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show available schemes
        run: xcodebuild -list || true

      - name: Build app binary without signing
        run: |
          set -o pipefail
          xcodebuild \
            -scheme "Meine App" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA for Sideloadly
        run: |
          set -euo pipefail

          PRODUCT_DIR="build/Build/Products/Release-iphoneos"
          EXECUTABLE_SRC="$PRODUCT_DIR/Meine App"
          APP_DIR="Payload/HomeUI.app"

          echo "Product directory contents:"
          find "$PRODUCT_DIR" -maxdepth 2 -print

          if [ ! -f "$EXECUTABLE_SRC" ]; then
            echo "Expected executable not found: $EXECUTABLE_SRC"
            exit 1
          fi

          rm -rf Payload HomeUI.ipa
          mkdir -p "$APP_DIR"
          cp "$EXECUTABLE_SRC" "$APP_DIR/HomeUI"
          chmod +x "$APP_DIR/HomeUI"
          printf 'APPL????' > "$APP_DIR/PkgInfo"

          python3 <<'PY'
          import math
          import os
          import struct
          import zlib

          app_dir = "Payload/HomeUI.app"

          def chunk(tag, data):
              return (
                  struct.pack(">I", len(data))
                  + tag
                  + data
                  + struct.pack(">I", zlib.crc32(tag + data) & 0xFFFFFFFF)
              )

          def write_png(path, size):
              rows = []
              for y in range(size):
                  row = bytearray([0])
                  for x in range(size):
                      nx = x / max(1, size - 1)
                      ny = y / max(1, size - 1)
                      vignette = 1 - min(0.55, math.hypot(nx - 0.5, ny - 0.5) * 0.75)
                      r = int((20 + 42 * nx) * vignette)
                      g = int((118 + 70 * (1 - ny)) * vignette)
                      b = int((210 + 28 * ny) * vignette)

                      cx = nx - 0.5
                      cy = ny - 0.52
                      roof = abs(cx) < 0.22 and -0.22 < cy < -0.02 and cy > (abs(cx) * 0.78 - 0.22)
                      body = abs(cx) < 0.17 and -0.02 <= cy < 0.20
                      door = abs(cx) < 0.045 and 0.065 < cy < 0.20
                      if roof or body:
                          r, g, b = 246, 248, 255
                      if door:
                          r, g, b = 34, 120, 230
                      row.extend((r, g, b))
                  rows.append(bytes(row))

              raw = b"".join(rows)
              png = (
                  b"\x89PNG\r\n\x1a\n"
                  + chunk(b"IHDR", struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0))
                  + chunk(b"IDAT", zlib.compress(raw, 9))
                  + chunk(b"IEND", b"")
              )
              with open(path, "wb") as f:
                  f.write(png)

          icons = {
              "AppIcon60x60@2x.png": 120,
              "AppIcon60x60@3x.png": 180,
              "AppIcon76x76@2x.png": 152,
              "AppIcon83.5x83.5@2x.png": 167,
              "AppIcon1024.png": 1024,
          }
          for name, size in icons.items():
              write_png(os.path.join(app_dir, name), size)
          PY

          cat > "$APP_DIR/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Home UI</string>
              <key>CFBundleExecutable</key>
              <string>HomeUI</string>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon60x60</string>
                      </array>
                      <key>UIPrerenderedIcon</key>
                      <false/>
                  </dict>
              </dict>
              <key>CFBundleIcons~ipad</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon76x76</string>
                          <string>AppIcon83.5x83.5</string>
                      </array>
                      <key>UIPrerenderedIcon</key>
                      <false/>
                  </dict>
              </dict>
              <key>CFBundleIdentifier</key>
              <string>com.urusborz.homeui</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>HomeUI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>18.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          PLIST

          plutil -lint "$APP_DIR/Info.plist"
          /usr/bin/zip -r -y HomeUI.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeUI-unsigned-ipa
          path: HomeUI.ipa
